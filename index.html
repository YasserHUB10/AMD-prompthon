<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Food & Health Assistant</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header>
            <h1><i class="fa-solid fa-leaf"></i> NutriSmart</h1>
            <p>AI-Powered Health Assistant</p>
        </header>

        <main>
            <!-- Goal Selector -->
            <section class="card goal-section">
                <h2>Your Goal</h2>
                <div class="goal-buttons">
                    <button class="goal-btn active" data-goal="loss">Weight Loss</button>
                    <button class="goal-btn" data-goal="maintain">Maintain</button>
                    <button class="goal-btn" data-goal="gain">Weight Gain</button>
                </div>
            </section>

            <!-- Dashboard -->
            <section class="card dashboard">
                <h2>Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <i class="fa-solid fa-fire"></i>
                        <h3 id="totalCalories">0</h3>
                        <p>Calories</p>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-utensils"></i>
                        <h3 id="mealCount">0</h3>
                        <p>Meals Logged</p>
                    </div>
                    <div class="stat-box">
                        <i class="fa-solid fa-heart-pulse"></i>
                        <h3 id="healthScore">100</h3>
                        <p>Health Score</p>
                    </div>
                </div>
                <button id="resetBtn" class="action-btn danger"><i class="fa-solid fa-trash"></i> Reset Today</button>
            </section>

            <!-- Log Food Form -->
            <section class="card log-food">
                <h2>Log a Meal</h2>
                <form id="foodForm">
                    <div class="input-group">
                        <input type="text" id="mealName" placeholder="e.g., Grilled Chicken Salad" required>
                    </div>
                    <div class="input-group">
                        <input type="number" id="mealCalories" placeholder="Calories (e.g., 350)" required min="1">
                    </div>
                    <button type="submit" class="action-btn primary"><i class="fa-solid fa-plus"></i> Add Meal</button>
                </form>
                <div class="meal-list-container">
                    <h3>Today's Meals</h3>
                    <ul id="mealList" class="meal-list">
                        <!-- Meals dynamically injected here -->
                    </ul>
                </div>
            </section>

            <!-- AI Suggestions -->
            <section class="card suggestions">
                <h2><i class="fa-solid fa-robot"></i> AI Suggestions</h2>
                <p class="suggestion-desc">Based on your <span id="currentGoalText" class="highlight">Weight Loss</span> goal:</p>
                <div id="aiSuggestions" class="suggestion-grid">
                    <!-- Suggestions dynamically injected here -->
                </div>
            </section>
        </main>
    </div>
    
    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
